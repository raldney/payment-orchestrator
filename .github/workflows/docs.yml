name: Deploy Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git Credentials
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: pip

      - name: Cache MkDocs build
        uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ hashFiles('requirements.txt', 'mkdocs.yml') }}
          path: .cache
          restore-keys: |
            mkdocs-material-

      - name: Install dependencies
        run: pip install mkdocs-material

      - name: Build & Deploy to GitHub Pages
        id: deploy
        run: |
          START=$(date +%s)
          mkdocs gh-deploy --force --clean --verbose
          END=$(date +%s)
          echo "duration=$((END - START))s" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_OUTPUT

      - name: Job Summary
        if: always()
        run: |
          REPO_URL="https://${{ github.repository_owner }}.github.io/$(echo '${{ github.repository }}' | cut -d'/' -f2)/"
          STATUS="${{ job.status }}"
          ICON="✅"
          [ "$STATUS" != "success" ] && ICON="❌"

          cat >> $GITHUB_STEP_SUMMARY << EOF
          # ${ICON} Documentation Deploy

          | | |
          |---|---|
          | **Status** | ${STATUS^} |
          | **Branch** | \`${{ github.ref_name }}\` |
          | **Commit** | [\`$(echo ${{ github.sha }} | cut -c1-7)\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |
          | **Triggered by** | ${{ github.actor }} |
          | **Build time** | ${{ steps.deploy.outputs.duration }} |
          | **Deployed at** | ${{ steps.deploy.outputs.timestamp }} |

          ## 🌐 Live URL

          > ### [$REPO_URL]($REPO_URL)
          > Served from the \`gh-pages\` branch via GitHub Pages.

          ## 📋 Steps

          | Step | Status |
          |---|---|
          | Checkout | ✅ |
          | Configure Git | ✅ |
          | Setup Python | ✅ |
          | Cache MkDocs | ✅ |
          | Install deps | ✅ |
          | Deploy | ${ICON} |

          ---
          _Workflow: \`${{ github.workflow }}\` · Run [${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})_
          EOF