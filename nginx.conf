events {
    worker_connections 1024;
}

http {
    upstream fastapi {
        server api:8000;
    }

    upstream grafana {
        server grafana:3000;
    }

    upstream rabbitmq_mgmt {
        server rabbitmq:15672;
    }

    server {
        listen 80;
        location / {
            return 301 https://$http_host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://fastapi;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Corrigido: Removida a barra final do proxy_pass para evitar duplicação de subpath
        location /grafana/ {
            proxy_pass http://grafana;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # RabbitMQ Management UI - acessível em /rabbitmq/ apenas via TLS
        location /rabbitmq/ {
            proxy_pass http://rabbitmq_mgmt/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Necessário para o Management UI funcionar em subpath
            proxy_set_header X-Forwarded-Prefix /rabbitmq;
            proxy_set_header Accept-Encoding "";
        }
    }
}
