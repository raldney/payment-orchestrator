# RabbitMQ 4.0 Configuration
# Permite o uso temporário de features depreciadas para manter compatibilidade com o Celery/Kombu

# 1. Permite coleta de métricas legada pelo Management Plugin (RabbitMQ 4 prefere Prometheus)
deprecated_features.permit.management_metrics_collection = true

# 2. Permite filas transientes não-exclusivas (comumente usadas pelo Celery para respostas)
deprecated_features.permit.transient_nonexcl_queues = true

# 3. Permite Global QoS (Celery/Kombu usa prefetch global em algumas versões)
deprecated_features.permit.global_qos = true

# Otimizações para RabbitMQ 4.0
vm_memory_high_watermark.relative = 0.6
disk_free_limit.relative = 1.0
